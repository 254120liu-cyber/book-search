<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜书神器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:32px 16px 48px;text-align:center}
.header h1{font-size:24px;margin-bottom:4px}
.header p{color:#889;font-size:13px}
.search-section{padding:0 16px;margin-top:-24px}
.search-box{max-width:500px;margin:0 auto;display:flex;gap:8px}
.search-box input{flex:1;padding:14px 16px;border:none;border-radius:12px;font-size:16px;outline:none;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.search-box button{background:#1a1a2e;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:15px;cursor:pointer;white-space:nowrap}
.search-box button:active{background:#333}
.results{padding:16px;max-width:500px;margin:0 auto}
.result-count{color:#888;font-size:13px;margin:8px 0 12px}
.book-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.book-title{font-size:16px;font-weight:600;color:#1a1a2e;line-height:1.4;margin-bottom:6px}
.book-meta{font-size:12px;color:#999;display:flex;flex-wrap:wrap;gap:4px 14px;margin-bottom:10px}
.book-meta span{white-space:nowrap}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:4px}
.badge-pdf{background:#fef3f2;color:#dc2626}
.badge-epub{background:#f0fdf4;color:#16a34a}
.badge-other{background:#eff6ff;color:#2563eb}
.get-btn{width:100%;background:#16a34a;color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;cursor:pointer}
.get-btn:active{background:#15803d}
.loading{text-align:center;padding:60px 0;color:#bbb;font-size:14px}
.loading::after{content:"...";animation:dots 1.5s steps(3,infinite)}@keyframes dots{0%{content:"."}33%{content:".."}66%{content:"..."}}
.empty{text-align:center;padding:60px 0;color:#bbb;font-size:14px}
.error{text-align:center;padding:40px 0;color:#ef4444;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:24px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:18px;margin-bottom:4px}
.modal .book-name{color:#888;font-size:13px;margin-bottom:16px}
.price{font-size:40px;color:#f59e0b;font-weight:700;text-align:center;margin:12px 0}
.qr-placeholder{width:180px;height:180px;background:#f5f5f5;border-radius:12px;margin:12px auto;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px}
.qr-placeholder img{width:100%;height:100%;border-radius:12px}
.dl-box{display:none;margin:16px 0;padding:14px;background:#f0fdf4;border-radius:8px;word-break:break-all;font-size:14px}
.dl-box a{color:#16a34a;font-weight:600}
.cancel-link{display:block;text-align:center;color:#bbb;font-size:13px;margin-top:12px;text-decoration:none;cursor:pointer}
.footer{text-align:center;padding:24px;color:#ddd;font-size:12px}
</style>
</head>
<body>

<div class="header">
  <h1>搜书神器</h1>
  <p>搜不到的不用花钱 &middot; 找到再付</p>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="text" id="q" placeholder="书名 / 作者 / ISBN..." autofocus
           onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">搜索</button>
  </div>
</div>

<div class="results" id="results">
  <div class="empty">搜你想要的电子书</div>
</div>

<div class="footer">搜书神器 &middot; 仅提供资源检索</div>

<!-- 付费弹窗 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePay()">
  <div class="modal">
    <h3>获取下载链接</h3>
    <p class="book-name" id="modalTitle"></p>
    <div class="price">2 元</div>
    <div class="qr-placeholder" id="qrBox">支付二维码<br>（待配置）</div>
    <p style="text-align:center;color:#888;font-size:13px" id="payHint">扫码支付后，链接自动出现</p>
    <div class="dl-box" id="dlBox">
      <div>下载页面：</div>
      <a href="#" id="dlLink" target="_blank"></a>
    </div>
    <a class="cancel-link" onclick="closePay()">取消</a>
  </div>
</div>

<script>
let searchCache = {};

async function doSearch() {
  const q = document.getElementById("q").value.trim();
  if (!q) return;
  const box = document.getElementById("results");
  box.innerHTML = '<div class="loading">搜索中</div>';

  // 缓存
  if (searchCache[q]) {
    renderResults(searchCache[q]);
    return;
  }

  try {
    const r = await fetch("/api/search?q=" + encodeURIComponent(q));
    const d = await r.json();
    if (d.error) { box.innerHTML = '<div class="error">' + d.error + "</div>"; return; }
    if (!d.count) { box.innerHTML = '<div class="empty">未找到相关电子书，换个关键词试试</div>'; return; }
    searchCache[q] = d;
    renderResults(d);
  } catch (e) {
    box.innerHTML = '<div class="error">网络错误，请稍后重试</div>';
  }
}

function renderResults(data) {
  let h = '<div class="result-count">找到 ' + data.count + " 个结果</div>";
  data.results.forEach((b, i) => {
    let bc = b.filetype === "PDF" ? "badge-pdf" : b.filetype === "EPUB" ? "badge-epub" : "badge-other";
    h +=
      '<div class="book-card">' +
        '<div class="book-title">' + esc(b.title) + "</div>" +
        '<div class="book-meta">' +
          "<span>" + esc(b.author) + "</span>" +
          (b.year ? "<span>" + b.year + "</span>" : "") +
          "<span>" + b.filesize + "</span>" +
          '<span class="badge ' + bc + '">' + b.filetype + "</span>" +
        "</div>" +
        '<button class="get-btn" onclick="openPay(\'' + esc(b.title) + "','" + b.id + "')\">获取下载</button>" +
      "</div>";
  });
  document.getElementById("results").innerHTML = h;
}

function esc(s) { return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;") }

let currentBook = null;

function openPay(title, id) {
  currentBook = { title, id };
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("dlBox").style.display = "none";
  document.getElementById("qrBox").innerHTML = "支付二维码<br>（待配置）";
  document.getElementById("payHint").style.display = "";
  document.getElementById("overlay").classList.add("show");
  // 轮询支付状态（后续实现）
}

function closePay() {
  document.getElementById("overlay").classList.remove("show");
  currentBook = null;
}
</script>

</body>
</html>
